<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrenament dels herois</title>
<style>
:root{
  --fons:#faf7f1; --tinta:#2c2c2a; --tinta-suau:#6b6a63;
  --primari:#5346b0; --primari-fosc:#3f3590;
  --mental:#0c447c; --mental-fons:#e6f1fb;
  --fisic:#712b13; --fisic-fons:#faece7;
  --espiritual:#085041; --espiritual-fons:#e1f5ee;
  --targeta:#ffffff; --vora:#e5dfd3; --error:#a32d2d; --error-fons:#fcebeb;
  --radi:14px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--fons);color:var(--tinta);font-size:17px;line-height:1.5}
#app{max-width:640px;margin:0 auto;padding:16px 16px 100px}
h1{font-size:1.45rem;margin:8px 0 16px}
h2{font-size:1.05rem;margin:18px 0 8px;color:var(--tinta-suau);font-weight:600}
h3{font-size:1.2rem;margin:4px 0 6px}
p{margin:6px 0}
a{color:var(--primari)}
button{font:inherit;cursor:pointer;border:none;border-radius:var(--radi)}
.targeta{background:var(--targeta);border:1px solid var(--vora);border-radius:var(--radi);padding:16px;margin:12px 0}
.segments{display:flex;flex-wrap:wrap;gap:8px}
.segments button{min-height:52px;padding:10px 16px;background:var(--targeta);border:2px solid var(--vora);border-radius:var(--radi);font-size:1.05rem;flex:1 1 auto}
.segments button.actiu{border-color:var(--primari);background:#efedfb;color:var(--primari-fosc);font-weight:600}
.durada-lliure{display:flex;align-items:center;gap:8px;margin-top:10px;color:var(--tinta-suau)}
.durada-lliure input{width:90px;min-height:48px;font:inherit;font-size:1.1rem;padding:6px 10px;border:2px solid var(--vora);border-radius:10px;text-align:center}
.gran{width:100%;min-height:64px;padding:16px;font-size:1.3rem;font-weight:600;background:var(--primari);color:#fff;margin-top:20px}
.gran:active{background:var(--primari-fosc)}
.secundari{width:100%;min-height:52px;padding:12px;font-size:1.05rem;background:var(--targeta);border:2px solid var(--vora);color:var(--tinta);margin-top:10px}
.petit{min-height:44px;padding:8px 14px;font-size:.95rem;background:var(--fons);border:1.5px solid var(--vora);color:var(--tinta-suau)}
.perill{color:var(--error);border-color:#f0c5c5}
.bloc-cap{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.bloc-tipus{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--tinta-suau)}
.minuts{font-weight:700;color:var(--primari-fosc);white-space:nowrap}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.chip{font-size:.85rem;font-weight:600;padding:4px 12px;border-radius:999px}
.chip-mental{background:var(--mental-fons);color:var(--mental)}
.chip-fisic{background:var(--fisic-fons);color:var(--fisic)}
.chip-espiritual{background:var(--espiritual-fons);color:var(--espiritual)}
.detall{font-size:.95rem;color:var(--tinta-suau);margin:4px 0}
.avis{background:#faeeda;color:#633806;border-radius:var(--radi);padding:12px 16px;margin:12px 0}
.error-caixa{background:var(--error-fons);color:var(--error);border-radius:var(--radi);padding:12px 16px;margin:12px 0}
.fila-fill{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap}
.fila-fill input[type=text]{flex:1 1 120px;min-width:100px}
.fila-fill input{font:inherit;min-height:48px;padding:6px 10px;border:2px solid var(--vora);border-radius:10px}
.targeta input[type=email],.targeta input[type=password]{width:100%;min-height:52px;font:inherit;font-size:1.05rem;padding:8px 12px;border:2px solid var(--vora);border-radius:10px;margin:6px 0;box-sizing:border-box}
.camp-num{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0}
.camp-num input{width:90px;min-height:48px;font:inherit;font-size:1.05rem;padding:6px 10px;border:2px solid var(--vora);border-radius:10px;text-align:center}
nav{position:fixed;bottom:0;left:0;right:0;background:var(--targeta);border-top:1px solid var(--vora);display:flex;justify-content:space-around;padding:6px 0 max(6px, env(safe-area-inset-bottom))}
nav a{flex:1;text-align:center;padding:12px 1px;text-decoration:none;color:var(--tinta-suau);font-size:.82rem;font-weight:600;border-radius:10px;margin:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
nav a.actiu{color:var(--primari-fosc);background:#efedfb}
#toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--tinta);color:#fff;padding:12px 20px;border-radius:999px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center}
#toast.visible{opacity:1}
.test-ok{color:#27500a}
.test-ko{color:var(--error);font-weight:600}
.buit{text-align:center;color:var(--tinta-suau);padding:40px 10px}
.cerca{width:100%;font:inherit;font-size:1.05rem;padding:10px 12px;border:2px solid var(--vora);border-radius:10px;margin:8px 0;background:var(--targeta)}
.formulari input[type=text],.formulari input[type=url],.formulari textarea{width:100%;font:inherit;padding:8px 12px;border:2px solid var(--vora);border-radius:10px;margin:4px 0;background:var(--targeta)}
.formulari textarea{min-height:70px;resize:vertical}
.formulari input[type=number]{width:100%;font:inherit;padding:8px;border:2px solid var(--vora);border-radius:10px;text-align:center}
.etiqueta{font-size:.9rem;font-weight:600;color:var(--tinta-suau);margin-top:12px;display:block}
.grup-caselles{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
.grup-caselles label{display:flex;align-items:center;gap:8px;font-size:1rem;min-height:46px;padding:4px 12px;border:1.5px solid var(--vora);border-radius:10px;background:var(--targeta)}
.grup-caselles input{width:20px;height:20px}
.fila-dos{display:flex;gap:10px}
.fila-dos>div{flex:1}
.accions-fila{display:flex;gap:8px;margin-top:10px}
.accions-fila .petit{flex:1}
</style>
</head>
<body>
<main id="app"></main>
<nav>
  <a href="#/generar" data-ruta="/generar">Genera</a>
  <a href="#/sessio" data-ruta="/sessio">Sessió</a>
  <a href="#/activitats" data-ruta="/activitats">Activitats</a>
  <a href="#/historial" data-ruta="/historial">Historial</a>
  <a href="#/parametres" data-ruta="/parametres">Paràmetres</a>
</nav>
<div id="toast"></div>
<script src="https://www.gstatic.com/firebasejs/12.3.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.3.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore-compat.js"></script>
<script>
'use strict';

/* ============================================================
   1. UTILITATS
   ============================================================ */
const DIMENSIONS = ['mental', 'fisic', 'espiritual'];
const NOM_DIM = { mental: 'Mental', fisic: 'Físic', espiritual: 'Espiritual' };
const NOM_BLOC = { obertura: 'Obertura', nucli: 'Nucli', tancament: 'Tancament' };
const MIN_ACTIVITAT_NUCLI = 5;

function atzar() {
  const b = new Uint32Array(1);
  crypto.getRandomValues(b);
  return b[0] / 4294967296;
}
function enterAtzar(n) { return Math.floor(atzar() * n); }
function baralla(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = enterAtzar(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function triaPonderada(items, pesDe) {
  const pesos = items.map(pesDe);
  const total = pesos.reduce((s, p) => s + p, 0);
  let r = atzar() * total;
  for (let i = 0; i < items.length; i++) {
    r -= pesos[i];
    if (r < 0) return items[i];
  }
  return items[items.length - 1];
}
function limita(v, min, max) { return Math.max(min, Math.min(max, v)); }
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
  ));
}

/* ============================================================
   2. CATÀLEG D'EXEMPLE
   ============================================================ */
const CATALEG_EXEMPLE = [
  { id: 'resp-flor', nom: 'Respiració de la flor', descripcio: 'Inspira imaginant que olores una flor, expira bufant espelmes molt a poc a poc.', url: '', dimensions: ['espiritual', 'mental'], funcio: ['obertura', 'tancament'], durada_min: 3, durada_max: 7, intensitat: 'suau', lloc: ['interior', 'exterior'], edat_min: 3, edat_max: 12, materials: 'cap' },
  { id: 'ioga-animals', nom: 'Ioga dels animals', descripcio: 'Postures imitant animals: el gat, la cobra, el gos, la papallona. Cada nen en proposa una.', url: '', dimensions: ['fisic', 'espiritual'], funcio: ['obertura', 'nucli'], durada_min: 5, durada_max: 15, intensitat: 'suau', lloc: ['interior', 'exterior'], edat_min: 3, edat_max: 12, materials: 'estora o manta (opcional)' },
  { id: 'circuit-obstacles', nom: 'Circuit d’obstacles', descripcio: 'Munteu un recorregut amb coixins, cadires i cordes: saltar, gatejar, esquivar, mantenir l’equilibri.', url: '', dimensions: ['fisic'], funcio: ['nucli'], durada_min: 8, durada_max: 20, intensitat: 'intensa', lloc: ['interior', 'exterior'], edat_min: 3, edat_max: 12, materials: 'coixins, cadires, corda' },
  { id: 'memory-parelles', nom: 'Memory de parelles', descripcio: 'Joc de memòria amb cartes girades: qui troba més parelles? Variant: recordar on era una carta concreta.', url: '', dimensions: ['mental'], funcio: ['nucli'], durada_min: 5, durada_max: 15, intensitat: 'suau', lloc: ['interior'], edat_min: 3, edat_max: 9, materials: 'joc de memory o baralla de cartes' },
  { id: 'cacera-tresor', nom: 'Cacera del tresor', descripcio: 'Amaga objectes i dona pistes senzilles (fred/calent, enigmes curts). Els nens busquen en equip.', url: '', dimensions: ['mental', 'fisic'], funcio: ['nucli'], durada_min: 10, durada_max: 25, intensitat: 'mitjana', lloc: ['interior', 'exterior'], edat_min: 4, edat_max: 12, materials: 'petits objectes per amagar' },
  { id: 'pot-gratitud', nom: 'El pot de la gratitud', descripcio: 'Cadascú diu (o dibuixa) una cosa bona del dia i la fiquem en un pot. De tant en tant les rellegim.', url: '', dimensions: ['espiritual'], funcio: ['nucli', 'tancament'], durada_min: 5, durada_max: 10, intensitat: 'suau', lloc: ['interior'], edat_min: 4, edat_max: 12, materials: 'pot i papers' },
  { id: 'ball-estatues', nom: 'Ball de les estàtues', descripcio: 'Música i ball lliure; quan la música para, tothom queda immòbil com una estàtua.', url: '', dimensions: ['fisic'], funcio: ['obertura', 'nucli'], durada_min: 5, durada_max: 12, intensitat: 'mitjana', lloc: ['interior', 'exterior'], edat_min: 3, edat_max: 10, materials: 'música' },
  { id: 'endevina-so', nom: 'Endevina el so', descripcio: 'Ulls tancats i escolta atenta: quins sons sentim? Qui n’identifica més? Acaba amb un minut de silenci.', url: '', dimensions: ['mental', 'espiritual'], funcio: ['obertura'], durada_min: 3, durada_max: 8, intensitat: 'suau', lloc: ['interior', 'exterior'], edat_min: 3, edat_max: 12, materials: 'cap' },
  { id: 'estiraments-nuvol', nom: 'Estiraments del núvol', descripcio: 'Estiraments suaus imaginant que som núvols que es desfan: braços amunt, costats, tocar-se els peus.', url: '', dimensions: ['fisic', 'espiritual'], funcio: ['tancament'], durada_min: 3, durada_max: 8, intensitat: 'suau', lloc: ['interior', 'exterior'], edat_min: 3, edat_max: 12, materials: 'cap' },
  { id: 'conte-cooperatiu', nom: 'Conte cooperatiu', descripcio: 'Inventem un conte entre tots: cadascú afegeix una frase. Variant: amb personatges sortejats.', url: '', dimensions: ['mental'], funcio: ['nucli', 'tancament'], durada_min: 5, durada_max: 15, intensitat: 'suau', lloc: ['interior', 'exterior'], edat_min: 4, edat_max: 12, materials: 'cap' }
];

/* ============================================================
   3. DADES COMPARTIDES (Firebase: Auth + Firestore)
   La configuració és pública per disseny; la seguretat són les
   regles de Firestore (només el compte familiar llegeix/escriu).
   ============================================================ */
const firebaseConfig = {
  apiKey: 'AIzaSyDyeQJEu5kYCvMgnk7oqWkIP68wf0teB7o',
  authDomain: 'entrenament-dels-herois.firebaseapp.com',
  projectId: 'entrenament-dels-herois',
  storageBucket: 'entrenament-dels-herois.firebasestorage.app',
  messagingSenderId: '800971813286',
  appId: '1:800971813286:web:88ee0f8b8fa67e92b91f67'
};
firebase.initializeApp(firebaseConfig);
const autenticacio = firebase.auth();
const bd = firebase.firestore();

const CLAU_LOCAL = 'herois.v1';
const CLAU_MIGRAT = 'herois.v1.migrat';

let dades = null;
let usuari = null;
let refFamilia = null;
let aturaEscoltes = [];

function dadesInicials() {
  return {
    versio: 1,
    parametres: { fills: [], dies_exclusio: 7, dies_penalitzacio: 21 },
    cataleg: CATALEG_EXEMPLE.slice(),
    historial: []
  };
}
function dadesValides(d) {
  return d && d.versio === 1 && Array.isArray(d.cataleg) &&
    Array.isArray(d.historial) && d.parametres && Array.isArray(d.parametres.fills);
}
function llegeixLocal() {
  try {
    if (localStorage.getItem(CLAU_MIGRAT)) return null;
    const brut = localStorage.getItem(CLAU_LOCAL);
    if (!brut) return null;
    const d = JSON.parse(brut);
    return dadesValides(d) ? d : null;
  } catch (e) {
    return null;
  }
}

async function preparaFamilia() {
  const doc = await refFamilia.get();
  if (doc.exists) return;
  const local = llegeixLocal();
  const inicials = local || dadesInicials();
  const lot = bd.batch();
  lot.set(refFamilia, { versio: 1, parametres: inicials.parametres });
  for (const a of inicials.cataleg) lot.set(refFamilia.collection('activitats').doc(a.id), a);
  for (const s of inicials.historial) lot.set(refFamilia.collection('sessions').doc(), s);
  await lot.commit();
  if (local) localStorage.setItem(CLAU_MIGRAT, '1');
}

function escoltaCanvis() {
  let fam = null, cataleg = null, historial = null;
  function combina(repinta) {
    if (fam === null || cataleg === null || historial === null) return;
    dades = {
      versio: 1,
      parametres: fam.parametres || dadesInicials().parametres,
      cataleg: cataleg,
      historial: historial
    };
    if (repinta) renavega();
  }
  const errorCarrega = () => {
    dades = null;
    app.innerHTML = '<h1>⚡ Entrenament dels herois</h1><div class="error-caixa">No s’han pogut carregar les dades. Comprova la connexió a internet i recarrega la pàgina.</div>';
  };
  aturaEscoltes.push(refFamilia.onSnapshot(d => { fam = d.data() || {}; combina(!d.metadata.hasPendingWrites); }, errorCarrega));
  aturaEscoltes.push(refFamilia.collection('activitats').onSnapshot(q => { cataleg = q.docs.map(d => d.data()); combina(!q.metadata.hasPendingWrites); }, errorCarrega));
  aturaEscoltes.push(refFamilia.collection('sessions').orderBy('data').onSnapshot(q => { historial = q.docs.map(d => d.data()); combina(!q.metadata.hasPendingWrites); }, errorCarrega));
}

function desaParametres() {
  refFamilia.set({ versio: 1, parametres: dades.parametres }, { merge: true })
    .catch(() => toast('No s’han pogut desar els canvis. Comprova la connexió.'));
}
function desaSessioFeta(entrada) {
  refFamilia.collection('sessions').add(entrada)
    .catch(() => toast('No s’ha pogut guardar la sessió. Comprova la connexió.'));
}
function desaActivitat(activitat) {
  refFamilia.collection('activitats').doc(activitat.id).set(activitat)
    .catch(() => toast('No s’ha pogut desar l’activitat. Comprova la connexió.'));
}
function esborraActivitat(id) {
  refFamilia.collection('activitats').doc(id).delete()
    .catch(() => toast('No s’ha pogut esborrar l’activitat. Comprova la connexió.'));
}

function validaActivitat(a) {
  const errors = [];
  if (!a.nom || !a.nom.trim()) errors.push('Cal un nom.');
  if (!a.dimensions.length) errors.push('Tria almenys una dimensió.');
  if (!a.funcio.length) errors.push('Tria almenys una funció (obertura, nucli o tancament).');
  if (!a.lloc.length) errors.push('Tria almenys un lloc.');
  if (!['suau', 'mitjana', 'intensa'].includes(a.intensitat)) errors.push('Intensitat no vàlida.');
  if (!(a.durada_min >= 1)) errors.push('La durada mínima ha de ser d’almenys 1 minut.');
  if (!(a.durada_max >= a.durada_min)) errors.push('La durada màxima no pot ser més petita que la mínima.');
  if (!(a.edat_min >= 0 && a.edat_max >= a.edat_min)) errors.push('El rang d’edats no és coherent.');
  if (a.url && !/^https?:\/\//.test(a.url)) errors.push('L’enllaç ha de començar per http:// o https://.');
  return errors;
}
function netejaSlug(text) {
  return text.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 40) || 'activitat';
}
function generaIdUnic(nom, cataleg) {
  const base = netejaSlug(nom);
  const ids = new Set(cataleg.map(a => a.id));
  if (!ids.has(base)) return base;
  let n = 2;
  while (ids.has(base + '-' + n)) n++;
  return base + '-' + n;
}

function validaCopia(d) {
  if (!d || d.versio !== 1) return 'El fitxer no és una còpia vàlida d’aquesta app (falta la versió de l’esquema).';
  if (!d.parametres || !Array.isArray(d.parametres.fills)) return 'El fitxer no té paràmetres vàlids.';
  if (!Array.isArray(d.cataleg)) return 'El fitxer no té catàleg d’activitats.';
  if (!Array.isArray(d.historial)) return 'El fitxer no té historial.';
  for (const a of d.cataleg) {
    if (!a || !a.id || !a.nom) return 'El catàleg del fitxer conté activitats sense identificador o nom.';
  }
  return null;
}
function fusionaCataleg(actual, importat) {
  const idsActuals = new Set(actual.map(a => a.id));
  const cataleg = actual.map(a => importat.find(x => x.id === a.id) || a);
  const afegides = importat.filter(x => !idsActuals.has(x.id));
  return {
    cataleg: cataleg.concat(afegides),
    afegides: afegides.length,
    actualitzades: importat.length - afegides.length
  };
}
function sessionsNoves(actual, importat) {
  const dates = new Set(actual.map(s => s.data));
  return importat.filter(s => s.data && !dates.has(s.data));
}

function baixaFitxer(nomFitxer, contingut) {
  const blob = new Blob([contingut], { type: 'application/json' });
  const enllac = document.createElement('a');
  enllac.href = URL.createObjectURL(blob);
  enllac.download = nomFitxer;
  document.body.appendChild(enllac);
  enllac.click();
  enllac.remove();
  setTimeout(() => URL.revokeObjectURL(enllac.href), 5000);
}
function exportaDades(ambHistorial) {
  const copia = {
    versio: 1,
    exportat: new Date().toISOString(),
    parametres: dades.parametres,
    cataleg: dades.cataleg,
    historial: ambHistorial ? dades.historial : []
  };
  baixaFitxer('herois-copia-' + new Date().toISOString().slice(0, 10) + '.json', JSON.stringify(copia, null, 2));
}
async function importaDades(objecte) {
  const problema = validaCopia(objecte);
  if (problema) { toast(problema); return; }
  try {
    localStorage.setItem('herois.copia-previa', JSON.stringify({ versio: 1, guardadaEl: new Date().toISOString(), parametres: dades.parametres, cataleg: dades.cataleg, historial: dades.historial }));
  } catch (e) { }
  const fusio = fusionaCataleg(dades.cataleg, objecte.cataleg);
  const noves = sessionsNoves(dades.historial, objecte.historial);
  const lot = bd.batch();
  lot.set(refFamilia, { versio: 1, parametres: objecte.parametres });
  for (const a of fusio.cataleg) lot.set(refFamilia.collection('activitats').doc(a.id), a);
  for (const s of noves) lot.set(refFamilia.collection('sessions').doc(), s);
  await lot.commit();
  toast('Còpia importada: ' + fusio.afegides + ' activitats noves, ' + fusio.actualitzades + ' actualitzades i ' + noves.length + ' sessions afegides.');
}

autenticacio.onAuthStateChanged(async u => {
  usuari = u;
  aturaEscoltes.forEach(atura => atura());
  aturaEscoltes = [];
  dades = null;
  if (!u) {
    refFamilia = null;
    navega();
    return;
  }
  refFamilia = bd.collection('families').doc(u.uid);
  navega();
  try {
    await preparaFamilia();
    escoltaCanvis();
  } catch (e) {
    app.innerHTML = '<h1>⚡ Entrenament dels herois</h1><div class="error-caixa">No s’han pogut preparar les dades de la família (' + esc(e.message || e) + '). Recarrega la pàgina per tornar-ho a provar.</div>';
  }
});

/* ============================================================
   4. GENERADOR (funcions pures: no toquen DOM ni localStorage)
   ============================================================ */
function edatAnys(naixement, ara) {
  const n = new Date(naixement + 'T00:00:00');
  let anys = ara.getFullYear() - n.getFullYear();
  const m = ara.getMonth() - n.getMonth();
  if (m < 0 || (m === 0 && ara.getDate() < n.getDate())) anys--;
  return anys;
}
function rangEdats(fills, ara) {
  const edats = fills.filter(f => f.naixement).map(f => edatAnys(f.naixement, ara));
  if (!edats.length) return null;
  return { min: Math.min(...edats), max: Math.max(...edats) };
}
function nivellsPermesos(intensitat) {
  return { suau: ['suau'], normal: ['suau', 'mitjana'], intensa: ['suau', 'mitjana', 'intensa'] }[intensitat];
}
function activitatCompatible(a, ctx) {
  return a.edat_min <= ctx.edats.min && a.edat_max >= ctx.edats.max &&
    (ctx.lloc === 'qualsevol' || a.lloc.includes(ctx.lloc)) &&
    ctx.nivells.includes(a.intensitat);
}
function calculaBlocs(durada) {
  const obertura = Math.max(3, Math.round(durada * 0.10));
  const tancament = Math.max(3, Math.round(durada * 0.10));
  return { obertura, tancament, nucli: durada - obertura - tancament };
}
function errorSessio(missatge) { return { ok: false, error: missatge }; }

function ultimaVegada(historial) {
  const mapa = new Map();
  for (const s of historial) {
    const t = new Date(s.data).getTime();
    for (const a of s.activitats) {
      if (!mapa.has(a.id) || mapa.get(a.id) < t) mapa.set(a.id, t);
    }
  }
  return mapa;
}
function pesHistorial(id, mapaUltima, parametres, ara) {
  const t = mapaUltima.get(id);
  if (t === undefined) return 1;
  const dies = (ara.getTime() - t) / 86400000;
  if (dies < parametres.dies_exclusio) return 0;
  if (dies < parametres.dies_penalitzacio) return 0.35;
  return 1;
}
function minutsPerDimensio(historial, ara, diesFinestra) {
  const res = { mental: 0, fisic: 0, espiritual: 0 };
  for (const s of historial) {
    if ((ara.getTime() - new Date(s.data).getTime()) / 86400000 > diesFinestra) continue;
    for (const a of s.activitats) {
      for (const d of a.dimensions) res[d] += a.minuts / a.dimensions.length;
    }
  }
  return res;
}
function triaAmbHistorial(cands, pesDe) {
  const frescos = cands.filter(a => pesDe(a) > 0);
  if (frescos.length) return triaPonderada(frescos, pesDe);
  return cands[enterAtzar(cands.length)];
}

function generaSessio(peticio, cataleg, parametres, historial, opcions) {
  const ara = (opcions && opcions.ara) || new Date();
  const mapaUltima = ultimaVegada(historial || []);
  const pesHist = a => pesHistorial(a.id, mapaUltima, parametres, ara);
  const edats = rangEdats(parametres.fills, ara);
  if (!edats) return errorSessio('Abans de generar cal indicar les dates de naixement dels fills a Paràmetres.');
  if (!cataleg.length) return errorSessio('El catàleg és buit. Afegeix activitats per poder generar sessions.');

  const ctx = { edats, lloc: peticio.lloc, nivells: nivellsPermesos(peticio.intensitat) };
  const base = cataleg.filter(a => activitatCompatible(a, ctx));
  if (!base.length) return errorSessio('Cap activitat del catàleg encaixa amb aquests filtres (edats ' + edats.min + '-' + edats.max + ', ' + peticio.lloc + ', ' + peticio.intensitat + '). Prova amb altres opcions o afegeix activitats.');

  const blocs = calculaBlocs(peticio.durada);
  const treballRecent = minutsPerDimensio(historial || [], ara, parametres.dies_penalitzacio || 21);
  let dims = baralla(DIMENSIONS);
  dims.sort((x, y) => treballRecent[x] - treballRecent[y]);
  const descartades = [];
  while (blocs.nucli / dims.length < MIN_ACTIVITAT_NUCLI && dims.length > 1) {
    descartades.push(dims.pop());
  }
  if (blocs.nucli / dims.length < MIN_ACTIVITAT_NUCLI) {
    return errorSessio('La sessió és massa curta per fer un nucli amb sentit. Tria una durada d’almenys 12 minuts.');
  }
  const tempsDim = blocs.nucli / dims.length;

  const usats = new Set();
  const activitats = [];

  for (const dim of dims) {
    const cands = base.filter(a =>
      a.funcio.includes('nucli') && a.dimensions.includes(dim) &&
      !usats.has(a.id) && a.durada_min <= tempsDim);
    if (cands.length) {
      const a = triaAmbHistorial(cands, pesHist);
      usats.add(a.id);
      activitats.push({ activitat: a, bloc: 'nucli', dimensions: [dim], minuts: limita(Math.round(tempsDim), a.durada_min, a.durada_max) });
    } else {
      const amfitrio = activitats.find(x => x.bloc === 'nucli' && x.activitat.dimensions.includes(dim));
      if (!amfitrio) {
        return errorSessio('No hi ha cap activitat de nucli compatible per a la dimensió ' + NOM_DIM[dim].toLowerCase() + ' amb aquests filtres. Afegeix-ne al catàleg o canvia les opcions.');
      }
      amfitrio.dimensions.push(dim);
      amfitrio.minuts = limita(amfitrio.minuts + Math.round(tempsDim), amfitrio.activitat.durada_min, amfitrio.activitat.durada_max);
    }
  }

  const minutsSessio = { mental: 0, fisic: 0, espiritual: 0 };
  for (const x of activitats) {
    for (const d of x.dimensions) minutsSessio[d] += x.minuts / x.dimensions.length;
  }
  const minimCobert = Math.min(...DIMENSIONS.map(d => minutsSessio[d]));
  const dimsPrioritaries = new Set(DIMENSIONS.filter(d => minutsSessio[d] === minimCobert));
  function triaExtrem(funcio, temps) {
    const cands = base.filter(a => a.funcio.includes(funcio) && !usats.has(a.id) && a.durada_min <= temps);
    if (!cands.length) return null;
    const a = triaAmbHistorial(cands, c => pesHist(c) * (c.dimensions.some(d => dimsPrioritaries.has(d)) ? 3 : 1));
    usats.add(a.id);
    return { activitat: a, bloc: funcio, dimensions: a.dimensions.slice(), minuts: limita(temps, a.durada_min, a.durada_max) };
  }
  const obertura = triaExtrem('obertura', blocs.obertura);
  if (!obertura) return errorSessio('No hi ha cap activitat d’obertura compatible amb aquests filtres. Afegeix-ne al catàleg o canvia les opcions.');
  const tancament = triaExtrem('tancament', blocs.tancament);
  if (!tancament) return errorSessio('No hi ha cap activitat de tancament compatible amb aquests filtres. Afegeix-ne al catàleg o canvia les opcions.');

  const totes = [obertura, ...activitats, tancament];
  ajustaTemps(totes, peticio.durada);

  return {
    ok: true,
    sessio: {
      creada: ara.toISOString(),
      peticio: { durada: peticio.durada, lloc: peticio.lloc, intensitat: peticio.intensitat },
      dimensions_descartades: descartades,
      activitats: totes
    }
  };
}

function ajustaTemps(activitats, objectiu) {
  let total = activitats.reduce((s, x) => s + x.minuts, 0);
  let guarda = 200;
  while (total !== objectiu && guarda-- > 0) {
    const pas = objectiu > total ? 1 : -1;
    const mobils = activitats.filter(x => pas > 0
      ? x.minuts < x.activitat.durada_max
      : x.minuts > x.activitat.durada_min);
    if (!mobils.length) break;
    const triada = mobils.find(x => x.bloc === 'nucli') || mobils[0];
    triada.minuts += pas;
    total += pas;
  }
}

function substitueixActivitat(sessio, index, cataleg, parametres, historial, opcions) {
  const ara = (opcions && opcions.ara) || new Date();
  const mapaUltima = ultimaVegada(historial || []);
  const edats = rangEdats(parametres.fills, ara);
  if (!edats) return null;
  const ctx = { edats, lloc: sessio.peticio.lloc, nivells: nivellsPermesos(sessio.peticio.intensitat) };
  const actual = sessio.activitats[index];
  const idsSessio = new Set(sessio.activitats.map(x => x.activitat.id));
  const cands = cataleg.filter(a =>
    activitatCompatible(a, ctx) && !idsSessio.has(a.id) &&
    a.funcio.includes(actual.bloc) && a.durada_min <= actual.minuts &&
    (actual.bloc !== 'nucli' || actual.dimensions.every(d => a.dimensions.includes(d))));
  if (!cands.length) return null;
  const a = triaAmbHistorial(cands, c => pesHistorial(c.id, mapaUltima, parametres, ara));
  sessio.activitats[index] = {
    activitat: a, bloc: actual.bloc,
    dimensions: actual.bloc === 'nucli' ? actual.dimensions.slice() : a.dimensions.slice(),
    minuts: limita(actual.minuts, a.durada_min, a.durada_max)
  };
  ajustaTemps(sessio.activitats, sessio.peticio.durada);
  return sessio;
}

const app = document.getElementById('app');
let sessioActual = null;
const prefs = { durada: 30, lloc: 'qualsevol', intensitat: 'normal' };

function toast(missatge) {
  const t = document.getElementById('toast');
  t.textContent = missatge;
  t.classList.add('visible');
  clearTimeout(t._temp);
  t._temp = setTimeout(() => t.classList.remove('visible'), 2600);
}

function vistaAcces(missatge) {
  let html = '<h1>⚡ Entrenament dels herois</h1>';
  html += '<div class="targeta"><h3>Accés familiar</h3>';
  html += '<p class="detall">Entra amb el compte de la família. Només cal fer-ho un cop per dispositiu.</p>';
  html += '<input id="acces-correu" type="email" autocomplete="username" placeholder="Correu electrònic">';
  html += '<input id="acces-clau" type="password" autocomplete="current-password" placeholder="Contrasenya">';
  html += missatge ? '<div class="error-caixa">' + esc(missatge) + '</div>' : '';
  html += '<button class="gran" id="btn-entra">Entra</button></div>';
  app.innerHTML = html;
  const entra = () => {
    const correu = document.getElementById('acces-correu').value.trim();
    const clau = document.getElementById('acces-clau').value;
    if (!correu || !clau) { vistaAcces('Escriu el correu i la contrasenya.'); return; }
    document.getElementById('btn-entra').disabled = true;
    autenticacio.signInWithEmailAndPassword(correu, clau).catch(e => {
      const codi = (e && e.code) || '';
      let m = 'No s’ha pogut entrar (' + codi + ').';
      if (/invalid-credential|wrong-password|user-not-found|invalid-email/.test(codi)) m = 'Correu o contrasenya incorrectes.';
      if (/network-request-failed/.test(codi)) m = 'Sense connexió. Torna-ho a provar quan tinguis internet.';
      if (/too-many-requests/.test(codi)) m = 'Massa intents seguits. Espera una mica i torna-ho a provar.';
      vistaAcces(m);
    });
  };
  document.getElementById('btn-entra').addEventListener('click', entra);
  document.getElementById('acces-clau').addEventListener('keydown', e => { if (e.key === 'Enter') entra(); });
}

function chipsDims(dims) {
  return '<div class="chips">' + dims.map(d =>
    '<span class="chip chip-' + d + '">' + NOM_DIM[d] + '</span>').join('') + '</div>';
}

function targetaActivitat(item, index) {
  const a = item.activitat;
  let html = '<div class="targeta">';
  html += '<div class="bloc-cap"><span class="bloc-tipus">' + NOM_BLOC[item.bloc] + '</span>';
  html += '<span class="minuts">' + item.minuts + ' min</span></div>';
  html += '<h3>' + esc(a.nom) + '</h3>';
  html += chipsDims(item.dimensions);
  html += '<p>' + esc(a.descripcio) + '</p>';
  if (a.materials && a.materials !== 'cap') html += '<p class="detall">Materials: ' + esc(a.materials) + '</p>';
  if (a.url) html += '<p class="detall"><a href="' + esc(a.url) + '" target="_blank" rel="noopener">Veure la font ↗</a></p>';
  html += '<button class="petit" data-canvia="' + index + '">↻ Canvia aquesta activitat</button>';
  html += '</div>';
  return html;
}

function vistaGenerar() {
  const teFills = dades.parametres.fills.some(f => f.naixement);
  const duradesRapides = [15, 30, 45, 60];
  let html = '<h1>⚡ Entrenament dels herois</h1>';
  if (!teFills) {
    html += '<div class="avis">Primer pas: indica les dates de naixement dels teus fills a <a href="#/parametres">Paràmetres</a>.</div>';
  }
  html += '<h2>Quanta estona teniu?</h2><div class="segments" id="seg-durada">';
  for (const d of duradesRapides) {
    html += '<button data-durada="' + d + '"' + (prefs.durada === d ? ' class="actiu"' : '') + '>' + d + ' min</button>';
  }
  html += '</div>';
  html += '<div class="durada-lliure"><label for="durada-lliure">O una altra durada:</label>';
  html += '<input id="durada-lliure" type="number" min="12" max="180" value="' + (duradesRapides.includes(prefs.durada) ? '' : prefs.durada) + '"> min</div>';

  html += '<h2>On sereu?</h2><div class="segments" id="seg-lloc">';
  for (const [valor, nom] of [['interior', 'Interior'], ['exterior', 'Exterior'], ['qualsevol', 'Qualsevol']]) {
    html += '<button data-lloc="' + valor + '"' + (prefs.lloc === valor ? ' class="actiu"' : '') + '>' + nom + '</button>';
  }
  html += '</div>';

  html += '<h2>Intensitat</h2><div class="segments" id="seg-intensitat">';
  for (const [valor, nom] of [['suau', 'Suau'], ['normal', 'Normal'], ['intensa', 'Intensa']]) {
    html += '<button data-intensitat="' + valor + '"' + (prefs.intensitat === valor ? ' class="actiu"' : '') + '>' + nom + '</button>';
  }
  html += '</div>';

  html += '<button class="gran" id="btn-genera">Genera sessió</button>';
  html += '<div id="lloc-error"></div>';
  app.innerHTML = html;

  app.querySelector('#seg-durada').addEventListener('click', e => {
    const b = e.target.closest('button[data-durada]');
    if (!b) return;
    prefs.durada = Number(b.dataset.durada);
    vistaGenerar();
  });
  app.querySelector('#durada-lliure').addEventListener('change', e => {
    const v = Number(e.target.value);
    if (v >= 12 && v <= 180) {
      prefs.durada = v;
      vistaGenerar();
    }
  });
  app.querySelector('#seg-lloc').addEventListener('click', e => {
    const b = e.target.closest('button[data-lloc]');
    if (!b) return;
    prefs.lloc = b.dataset.lloc;
    vistaGenerar();
  });
  app.querySelector('#seg-intensitat').addEventListener('click', e => {
    const b = e.target.closest('button[data-intensitat]');
    if (!b) return;
    prefs.intensitat = b.dataset.intensitat;
    vistaGenerar();
  });
  app.querySelector('#btn-genera').addEventListener('click', () => {
    const r = generaSessio(prefs, dades.cataleg, dades.parametres, dades.historial);
    if (!r.ok) {
      app.querySelector('#lloc-error').innerHTML = '<div class="error-caixa">' + esc(r.error) + '</div>';
      return;
    }
    sessioActual = r.sessio;
    location.hash = '#/sessio';
  });
}

function vistaSessio() {
  if (!sessioActual) {
    app.innerHTML = '<h1>Sessió</h1><div class="buit"><p>Encara no hi ha cap sessió generada.</p>' +
      '<p><a href="#/generar">Genera’n una →</a></p></div>';
    return;
  }
  const s = sessioActual;
  const total = s.activitats.reduce((sum, x) => sum + x.minuts, 0);
  let html = '<h1>La sessió d’avui · ' + total + ' min</h1>';
  if (total !== s.peticio.durada) {
    html += '<div class="avis">Amb el catàleg actual la sessió queda de ' + total + ' min (n’havies demanat ' + s.peticio.durada + ').</div>';
  }
  if (s.dimensions_descartades.length) {
    html += '<div class="avis">Sessió curta: avui deixem la dimensió ' +
      s.dimensions_descartades.map(d => NOM_DIM[d].toLowerCase()).join(' i ') + ' per a la propera.</div>';
  }
  s.activitats.forEach((item, i) => { html += targetaActivitat(item, i); });
  html += '<button class="gran" id="btn-feta">✔ Marca com a feta</button>';
  html += '<button class="secundari" id="btn-regenera">↻ Regenera la sessió sencera</button>';
  app.innerHTML = html;

  app.addEventListener('click', gestorSessio);
  function gestorSessio(e) {
    const canvia = e.target.closest('button[data-canvia]');
    if (canvia) {
      app.removeEventListener('click', gestorSessio);
      const nova = substitueixActivitat(sessioActual, Number(canvia.dataset.canvia), dades.cataleg, dades.parametres, dades.historial);
      if (!nova) toast('No hi ha cap alternativa compatible per a aquesta activitat.');
      vistaSessio();
      return;
    }
    if (e.target.closest('#btn-regenera')) {
      app.removeEventListener('click', gestorSessio);
      const r = generaSessio(sessioActual.peticio, dades.cataleg, dades.parametres, dades.historial);
      if (r.ok) sessioActual = r.sessio; else toast(r.error);
      vistaSessio();
      return;
    }
    if (e.target.closest('#btn-feta')) {
      app.removeEventListener('click', gestorSessio);
      desaSessioFeta({
        data: new Date().toISOString(),
        durada: total,
        activitats: s.activitats.map(x => ({ id: x.activitat.id, bloc: x.bloc, dimensions: x.dimensions, minuts: x.minuts })),
        dimensions_descartades: s.dimensions_descartades
      });
      sessioActual = null;
      location.hash = '#/generar';
      toast('Sessió guardada. Bona feina, herois! 💪');
    }
  }
}

const estatActivitats = { cerca: '', dimensio: 'totes', editant: null };

function vistaActivitats() {
  if (estatActivitats.editant !== null) { vistaFormActivitat(); return; }
  let html = '<h1>Activitats</h1>';
  html += '<button class="secundari" id="btn-nova-activitat">+ Afegeix una activitat</button>';
  html += '<input class="cerca" id="cerca-activitats" type="search" placeholder="Cerca per nom o descripció" value="' + esc(estatActivitats.cerca) + '">';
  html += '<div class="segments" id="seg-dim-filtre">';
  for (const [valor, nom] of [['totes', 'Totes'], ['mental', 'Mental'], ['fisic', 'Físic'], ['espiritual', 'Espiritual']]) {
    html += '<button data-dim="' + valor + '"' + (estatActivitats.dimensio === valor ? ' class="actiu"' : '') + '>' + nom + '</button>';
  }
  html += '</div><div id="llista-activitats"></div>';
  app.innerHTML = html;
  pintaLlistaActivitats();

  app.querySelector('#btn-nova-activitat').addEventListener('click', () => {
    estatActivitats.editant = 'nova';
    vistaActivitats();
  });
  app.querySelector('#cerca-activitats').addEventListener('input', e => {
    estatActivitats.cerca = e.target.value;
    pintaLlistaActivitats();
  });
  app.querySelector('#seg-dim-filtre').addEventListener('click', e => {
    const b = e.target.closest('button[data-dim]');
    if (!b) return;
    estatActivitats.dimensio = b.dataset.dim;
    app.querySelectorAll('#seg-dim-filtre button').forEach(x => x.classList.toggle('actiu', x === b));
    pintaLlistaActivitats();
  });
  app.querySelector('#llista-activitats').addEventListener('click', e => {
    const edita = e.target.closest('button[data-edita]');
    if (edita) {
      estatActivitats.editant = edita.dataset.edita;
      vistaActivitats();
      return;
    }
    const esborra = e.target.closest('button[data-esborra-act]');
    if (esborra) {
      const id = esborra.dataset.esborraAct;
      const activitat = dades.cataleg.find(a => a.id === id);
      if (!activitat) return;
      if (confirm('Segur que vols esborrar «' + activitat.nom + '»? Les sessions antigues de l’historial la mostraran pel seu identificador.')) {
        dades.cataleg = dades.cataleg.filter(a => a.id !== id);
        esborraActivitat(id);
        pintaLlistaActivitats();
        toast('Activitat esborrada.');
      }
    }
  });
}

function pintaLlistaActivitats() {
  const contenidor = document.getElementById('llista-activitats');
  if (!contenidor) return;
  const cerca = estatActivitats.cerca.trim().toLowerCase();
  const seleccio = dades.cataleg
    .filter(a =>
      (estatActivitats.dimensio === 'totes' || a.dimensions.includes(estatActivitats.dimensio)) &&
      (!cerca || (a.nom + ' ' + (a.descripcio || '')).toLowerCase().includes(cerca)))
    .sort((x, y) => x.nom.localeCompare(y.nom, 'ca'));
  if (!seleccio.length) {
    contenidor.innerHTML = '<div class="buit"><p>' + (dades.cataleg.length ? 'Cap activitat coincideix amb la cerca.' : 'El catàleg és buit. Afegeix la primera activitat!') + '</p></div>';
    return;
  }
  contenidor.innerHTML = seleccio.map(a => {
    let h = '<div class="targeta">';
    h += '<div class="bloc-cap"><span class="bloc-tipus">' + a.funcio.map(f => NOM_BLOC[f]).join(' · ') + '</span>';
    h += '<span class="minuts">' + a.durada_min + '-' + a.durada_max + ' min</span></div>';
    h += '<h3>' + esc(a.nom) + '</h3>';
    h += chipsDims(a.dimensions);
    if (a.descripcio) h += '<p class="detall">' + esc(a.descripcio) + '</p>';
    h += '<p class="detall">Edats ' + a.edat_min + '-' + a.edat_max + ' · ' + a.intensitat + ' · ' + a.lloc.join(' i ') +
      (a.materials && a.materials !== 'cap' ? ' · Materials: ' + esc(a.materials) : '') + '</p>';
    if (a.url) h += '<p class="detall"><a href="' + esc(a.url) + '" target="_blank" rel="noopener">Veure la font ↗</a></p>';
    h += '<div class="accions-fila"><button class="petit" data-edita="' + esc(a.id) + '">✎ Edita</button>';
    h += '<button class="petit perill" data-esborra-act="' + esc(a.id) + '">Esborra</button></div>';
    h += '</div>';
    return h;
  }).join('');
}

function vistaFormActivitat(errors) {
  const esNova = estatActivitats.editant === 'nova';
  const original = esNova
    ? { nom: '', descripcio: '', url: '', dimensions: [], funcio: ['nucli'], durada_min: 5, durada_max: 15, intensitat: 'suau', lloc: ['interior', 'exterior'], edat_min: 3, edat_max: 12, materials: 'cap' }
    : dades.cataleg.find(a => a.id === estatActivitats.editant);
  if (!original) {
    estatActivitats.editant = null;
    vistaActivitats();
    return;
  }
  const valors = window._esborranyActivitat || original;
  let html = '<h1>' + (esNova ? 'Nova activitat' : 'Edita l’activitat') + '</h1><div class="formulari">';
  html += '<label class="etiqueta" for="act-nom">Nom</label><input type="text" id="act-nom" value="' + esc(valors.nom) + '">';
  html += '<label class="etiqueta" for="act-desc">Descripció</label><textarea id="act-desc">' + esc(valors.descripcio || '') + '</textarea>';
  html += '<label class="etiqueta" for="act-url">Enllaç a la font (opcional)</label><input type="url" id="act-url" value="' + esc(valors.url || '') + '" placeholder="https://...">';
  html += '<span class="etiqueta">Dimensions que treballa</span><div class="grup-caselles" id="grup-dims">';
  for (const d of DIMENSIONS) {
    html += '<label><input type="checkbox" value="' + d + '"' + (valors.dimensions.includes(d) ? ' checked' : '') + '>' + NOM_DIM[d] + '</label>';
  }
  html += '</div>';
  html += '<span class="etiqueta">On encaixa dins la sessió</span><div class="grup-caselles" id="grup-funcio">';
  for (const f of ['obertura', 'nucli', 'tancament']) {
    html += '<label><input type="checkbox" value="' + f + '"' + (valors.funcio.includes(f) ? ' checked' : '') + '>' + NOM_BLOC[f] + '</label>';
  }
  html += '</div>';
  html += '<div class="fila-dos"><div><label class="etiqueta" for="act-dmin">Minuts mínims</label><input type="number" id="act-dmin" min="1" max="120" value="' + valors.durada_min + '"></div>';
  html += '<div><label class="etiqueta" for="act-dmax">Minuts màxims</label><input type="number" id="act-dmax" min="1" max="120" value="' + valors.durada_max + '"></div></div>';
  html += '<span class="etiqueta">Intensitat</span><div class="segments" id="grup-intensitat">';
  for (const [valor, nom] of [['suau', 'Suau'], ['mitjana', 'Mitjana'], ['intensa', 'Intensa']]) {
    html += '<button type="button" data-int="' + valor + '"' + (valors.intensitat === valor ? ' class="actiu"' : '') + '>' + nom + '</button>';
  }
  html += '</div>';
  html += '<span class="etiqueta">Lloc</span><div class="grup-caselles" id="grup-lloc">';
  for (const [valor, nom] of [['interior', 'Interior'], ['exterior', 'Exterior']]) {
    html += '<label><input type="checkbox" value="' + valor + '"' + (valors.lloc.includes(valor) ? ' checked' : '') + '>' + nom + '</label>';
  }
  html += '</div>';
  html += '<div class="fila-dos"><div><label class="etiqueta" for="act-emin">Edat mínima</label><input type="number" id="act-emin" min="0" max="18" value="' + valors.edat_min + '"></div>';
  html += '<div><label class="etiqueta" for="act-emax">Edat màxima</label><input type="number" id="act-emax" min="0" max="18" value="' + valors.edat_max + '"></div></div>';
  html += '<label class="etiqueta" for="act-materials">Materials</label><input type="text" id="act-materials" value="' + esc(valors.materials || 'cap') + '">';
  html += (errors && errors.length) ? '<div class="error-caixa">' + errors.map(esc).join('<br>') + '</div>' : '';
  html += '<button class="gran" id="btn-desa-activitat">Desa l’activitat</button>';
  html += '<button class="secundari" id="btn-cancela">Cancel·la</button>';
  html += '</div>';
  app.innerHTML = html;

  app.querySelector('#grup-intensitat').addEventListener('click', e => {
    const b = e.target.closest('button[data-int]');
    if (!b) return;
    app.querySelectorAll('#grup-intensitat button').forEach(x => x.classList.toggle('actiu', x === b));
  });
  const cull = () => ({
    id: esNova ? null : original.id,
    nom: document.getElementById('act-nom').value.trim(),
    descripcio: document.getElementById('act-desc').value.trim(),
    url: document.getElementById('act-url').value.trim(),
    dimensions: Array.from(app.querySelectorAll('#grup-dims input:checked')).map(x => x.value),
    funcio: Array.from(app.querySelectorAll('#grup-funcio input:checked')).map(x => x.value),
    durada_min: Number(document.getElementById('act-dmin').value),
    durada_max: Number(document.getElementById('act-dmax').value),
    intensitat: (app.querySelector('#grup-intensitat button.actiu') || {}).dataset ? app.querySelector('#grup-intensitat button.actiu').dataset.int : '',
    lloc: Array.from(app.querySelectorAll('#grup-lloc input:checked')).map(x => x.value),
    edat_min: Number(document.getElementById('act-emin').value),
    edat_max: Number(document.getElementById('act-emax').value),
    materials: document.getElementById('act-materials').value.trim() || 'cap'
  });
  app.querySelector('#btn-desa-activitat').addEventListener('click', () => {
    const activitat = cull();
    const errors = validaActivitat(activitat);
    if (errors.length) {
      window._esborranyActivitat = activitat;
      vistaFormActivitat(errors);
      window._esborranyActivitat = null;
      return;
    }
    if (!activitat.id) activitat.id = generaIdUnic(activitat.nom, dades.cataleg);
    const posicio = dades.cataleg.findIndex(a => a.id === activitat.id);
    if (posicio >= 0) dades.cataleg[posicio] = activitat; else dades.cataleg.push(activitat);
    desaActivitat(activitat);
    estatActivitats.editant = null;
    vistaActivitats();
    toast('Activitat desada.');
  });
  app.querySelector('#btn-cancela').addEventListener('click', () => {
    estatActivitats.editant = null;
    vistaActivitats();
  });
}

function vistaHistorial() {
  let html = '<h1>Historial</h1>';
  if (!dades.historial.length) {
    html += '<div class="buit"><p>Encara no hi ha cap sessió feta.</p><p><a href="#/generar">Genera la primera →</a></p></div>';
    app.innerHTML = html;
    return;
  }
  const noms = new Map(dades.cataleg.map(a => [a.id, a.nom]));
  html += '<p class="detall">' + dades.historial.length + (dades.historial.length === 1 ? ' sessió feta' : ' sessions fetes') +
    '. Les activitats fetes fa menys de ' + dades.parametres.dies_exclusio + ' dies no es repetiran.</p>';
  for (const s of dades.historial.slice().reverse()) {
    const data = new Date(s.data);
    html += '<div class="targeta">';
    html += '<div class="bloc-cap"><span class="bloc-tipus">' + esc(data.toLocaleDateString('ca-ES', { weekday: 'long', day: 'numeric', month: 'long' })) + '</span>';
    html += '<span class="minuts">' + s.durada + ' min</span></div>';
    html += '<ul style="margin:8px 0;padding-left:20px">';
    for (const a of s.activitats) {
      html += '<li>' + esc(noms.get(a.id) || a.id) + ' <span class="detall">(' + a.minuts + ' min · ' + a.dimensions.map(d => NOM_DIM[d]).join(', ') + ')</span></li>';
    }
    html += '</ul>';
    if (s.dimensions_descartades && s.dimensions_descartades.length) {
      html += '<p class="detall">Sense la dimensió ' + s.dimensions_descartades.map(d => NOM_DIM[d].toLowerCase()).join(' ni ') + '</p>';
    }
    html += '</div>';
  }
  app.innerHTML = html;
}

    const edat = f.naixement ? edatAnys(f.naixement, ara) : null;
    html += '<div class="fila-fill">';
    html += '<input type="text" placeholder="Nom (opcional)" value="' + esc(f.nom || '') + '" data-camp="nom" data-i="' + i + '">';
    html += '<input type="date" value="' + esc(f.naixement || '') + '" min="1990-01-01" max="' + ara.toISOString().slice(0, 10) + '" data-camp="naixement" data-i="' + i + '">';
    html += '<span class="detall" data-edat="' + i + '">' + (edat !== null ? edat + ' anys' : '') + '</span>';
    html += '<button class="petit perill" data-esborra="' + i + '">Esborra</button>';
    html += '</div>';
  });
  if (!dades.parametres.fills.length) html += '<p class="detall">Encara no hi ha cap fill afegit.</p>';
  html += '<button class="secundari" id="btn-afegeix-fill">+ Afegeix un fill</button>';
  html += '</div>';

  html += '<h2>No-repetició</h2><div class="targeta">';
  html += '<p class="detall">Una activitat feta fa menys dies que el primer valor no torna a sortir; entre els dos valors, surt amb menys probabilitat.</p>';
  html += '<div class="camp-num"><label for="dies-exclusio">Dies sense repetir una activitat</label><input id="dies-exclusio" type="number" min="0" max="60" value="' + dades.parametres.dies_exclusio + '"></div>';
  html += '<div class="camp-num"><label for="dies-penalitzacio">Dies amb menys probabilitat de sortir</label><input id="dies-penalitzacio" type="number" min="0" max="120" value="' + dades.parametres.dies_penalitzacio + '"></div>';
  html += '</div>';
  html += '<h2>Còpia de seguretat</h2><div class="targeta">';
  html += '<p class="detall">Descarrega totes les dades en un fitxer JSON. Conté dades personals (dates de naixement i historial d’ús): guarda’l en un lloc segur.</p>';
  html += '<div class="grup-caselles"><label><input type="checkbox" id="exporta-historial" checked>Inclou l’historial</label></div>';
  html += '<button class="secundari" id="btn-exporta">⬇ Descarrega una còpia</button>';
  html += '<p class="detall" style="margin-top:14px">Importar una còpia fusiona les dades: actualitza les activitats existents, afegeix les noves i no esborra res. Abans d’aplicar-la es guarda una còpia de l’estat actual en aquest dispositiu.</p>';
  html += '<input type="file" id="fitxer-importa" accept=".json,application/json" style="display:none">';
  html += '<button class="secundari" id="btn-importa">⬆ Importa una còpia</button>';
  html += '</div>';
  html += '<h2>Compte</h2><div class="targeta">';
  html += '<p class="detall">Connectat com a ' + esc(usuari.email) + '. Les dades es comparteixen amb tots els dispositius que entrin amb aquest compte.</p>';
  html += '<button class="secundari" id="btn-surt">Tanca la sessió en aquest dispositiu</button></div>';
  html += '<p class="detall" style="text-align:center;margin-top:24px">Entrenament dels herois · v1.0</p>';
  app.innerHTML = html;

  app.querySelector('#btn-exporta').addEventListener('click', () => {
    exportaDades(app.querySelector('#exporta-historial').checked);
    toast('Còpia descarregada.');
  });
  app.querySelector('#btn-importa').addEventListener('click', () => app.querySelector('#fitxer-importa').click());
  app.querySelector('#fitxer-importa').addEventListener('change', e => {
    const fitxer = e.target.files[0];
    if (!fitxer) return;
    const lector = new FileReader();
    lector.onload = () => {
      let objecte = null;
      try { objecte = JSON.parse(lector.result); } catch (err) { toast('El fitxer no és un JSON vàlid.'); return; }
      if (confirm('Importar «' + fitxer.name + '»? Es fusionarà amb les dades actuals sense esborrar res.')) {
        importaDades(objecte).catch(() => toast('No s’ha pogut importar. Comprova la connexió.'));
      }
    };
    lector.readAsText(fitxer);
  });

  app.querySelector('#llista-fills').addEventListener('change', e => {
    const inp = e.target.closest('input[data-camp]');
    if (!inp) return;
    dades.parametres.fills[Number(inp.dataset.i)][inp.dataset.camp] = inp.value;
    desaParametres();
    if (inp.dataset.camp === 'naixement') {
      const etiqueta = app.querySelector('span[data-edat="' + inp.dataset.i + '"]');
      if (etiqueta) etiqueta.textContent = inp.value ? edatAnys(inp.value, new Date()) + ' anys' : '';
    }
  });
  app.querySelector('#llista-fills').addEventListener('click', e => {
    const esb = e.target.closest('button[data-esborra]');
    if (esb) {
      const i = Number(esb.dataset.esborra);
      const f = dades.parametres.fills[i];
      if (confirm('Segur que vols esborrar ' + (f.nom || 'aquest fill') + '?')) {
        dades.parametres.fills.splice(i, 1);
        desaParametres();
        vistaParametres();
      }
      return;
    }
    if (e.target.closest('#btn-afegeix-fill')) {
      dades.parametres.fills.push({ nom: '', naixement: '2000-01-01' });
      desaParametres();
      vistaParametres();
    }
  });
  app.querySelector('#dies-exclusio').addEventListener('change', e => {
    dades.parametres.dies_exclusio = Number(e.target.value);
    desaParametres();
  });
  app.querySelector('#dies-penalitzacio').addEventListener('change', e => {
    dades.parametres.dies_penalitzacio = Number(e.target.value);
    desaParametres();
  });
  app.querySelector('#btn-surt').addEventListener('click', () => {
    if (confirm('Tancar la sessió en aquest dispositiu?')) autenticacio.signOut();
  });
}

/* ============================================================
   6. TESTS D'INVARIANTS (ruta oculta #/tests)
   ============================================================ */
function executaTests() {
  const resultats = [];
  function prova(nom, fn) {
    try { fn(); resultats.push({ nom, ok: true }); }
    catch (e) { resultats.push({ nom, ok: false, detall: e.message }); }
  }
  function asserta(cond, msg) { if (!cond) throw new Error(msg); }
  function naixementPerEdat(anys) {
    const d = new Date();
    d.setFullYear(d.getFullYear() - anys);
    d.setMonth(d.getMonth() - 2);
    return d.toISOString().slice(0, 10);
  }
  const paramsProva = {
    fills: [{ nom: 'A', naixement: naixementPerEdat(4) }, { nom: 'B', naixement: naixementPerEdat(8) }],
    dies_exclusio: 7, dies_penalitzacio: 21
  };

  prova('calculaBlocs reparteix bé el temps', () => {
    const b30 = calculaBlocs(30);
    asserta(b30.obertura === 3 && b30.tancament === 3 && b30.nucli === 24, '30 min: ' + JSON.stringify(b30));
    const b15 = calculaBlocs(15);
    asserta(b15.obertura === 3 && b15.nucli === 9, '15 min: ' + JSON.stringify(b15));
    const b60 = calculaBlocs(60);
    asserta(b60.obertura === 6 && b60.nucli === 48, '60 min: ' + JSON.stringify(b60));
  });

  prova('intensitat acumulativa', () => {
    asserta(JSON.stringify(nivellsPermesos('suau')) === '["suau"]', 'suau');
    asserta(JSON.stringify(nivellsPermesos('normal')) === '["suau","mitjana"]', 'normal');
    asserta(nivellsPermesos('intensa').length === 3, 'intensa');
  });

  prova('edats calculades des de dates de naixement', () => {
    const r = rangEdats(paramsProva.fills, new Date());
    asserta(r.min === 4 && r.max === 8, 'rang: ' + JSON.stringify(r));
    asserta(rangEdats([], new Date()) === null, 'sense fills ha de ser null');
  });

  prova('errors clars: sense fills, catàleg buit, sessió massa curta', () => {
    const senseFills = generaSessio({ durada: 30, lloc: 'qualsevol', intensitat: 'normal' }, CATALEG_EXEMPLE, { fills: [] });
    asserta(!senseFills.ok && senseFills.error.includes('Paràmetres'), 'sense fills');
    const catBuit = generaSessio({ durada: 30, lloc: 'qualsevol', intensitat: 'normal' }, [], paramsProva);
    asserta(!catBuit.ok, 'catàleg buit');
    const curta = generaSessio({ durada: 8, lloc: 'qualsevol', intensitat: 'normal' }, CATALEG_EXEMPLE, paramsProva);
    asserta(!curta.ok && curta.error.includes('curta'), 'massa curta');
  });

  const combos = [];
  for (const durada of [12, 15, 20, 30, 45, 60])
    for (const lloc of ['interior', 'exterior', 'qualsevol'])
      for (const intensitat of ['suau', 'normal', 'intensa'])
        combos.push({ durada, lloc, intensitat });

  prova('invariants del generador (' + combos.length * 5 + ' sessions)', () => {
    for (const peticio of combos) {
      for (let rep = 0; rep < 5; rep++) {
        const r = generaSessio(peticio, CATALEG_EXEMPLE, paramsProva);
        const etiqueta = JSON.stringify(peticio);
        asserta(r.ok, 'ha fallat ' + etiqueta + ': ' + (r.error || ''));
        const s = r.sessio;
        const ids = s.activitats.map(x => x.activitat.id);
        asserta(new Set(ids).size === ids.length, 'activitat duplicada a ' + etiqueta);
        asserta(s.activitats[0].bloc === 'obertura', 'falta obertura a ' + etiqueta);
        asserta(s.activitats[s.activitats.length - 1].bloc === 'tancament', 'falta tancament a ' + etiqueta);
        const nivells = nivellsPermesos(peticio.intensitat);
        for (const item of s.activitats) {
          const a = item.activitat;
          asserta(item.minuts >= a.durada_min && item.minuts <= a.durada_max, a.id + ' fora de rang de minuts a ' + etiqueta);
          asserta(a.funcio.includes(item.bloc), a.id + ' no té la funció ' + item.bloc);
          asserta(nivells.includes(a.intensitat), a.id + ' viola intensitat a ' + etiqueta);
          asserta(peticio.lloc === 'qualsevol' || a.lloc.includes(peticio.lloc), a.id + ' viola lloc a ' + etiqueta);
          asserta(a.edat_min <= 4 && a.edat_max >= 8, a.id + ' viola edats a ' + etiqueta);
        }
        const cobertes = new Set();
        s.activitats.filter(x => x.bloc === 'nucli').forEach(x => x.dimensions.forEach(d => cobertes.add(d)));
        const totes = new Set([...cobertes, ...s.dimensions_descartades]);
        asserta(totes.size === 3, 'dimensions no quadren a ' + etiqueta + ': cobertes ' + [...cobertes] + ', descartades ' + s.dimensions_descartades);
        const total = s.activitats.reduce((sum, x) => sum + x.minuts, 0);
        if (Math.abs(total - peticio.durada) > 2) {
          const saturades = total < peticio.durada
            ? s.activitats.every(x => x.minuts === x.activitat.durada_max)
            : s.activitats.every(x => x.minuts === x.activitat.durada_min);
          asserta(saturades, 'temps no ajustat a ' + etiqueta + ': total ' + total);
        }
      }
    }
  });

  prova('aleatorietat: 10 sessions iguals de petició donen composicions variades', () => {
    const firmes = new Set();
    for (let i = 0; i < 10; i++) {
      const r = generaSessio({ durada: 30, lloc: 'qualsevol', intensitat: 'normal' }, CATALEG_EXEMPLE, paramsProva);
      asserta(r.ok, r.error || '');
      firmes.add(r.sessio.activitats.map(x => x.activitat.id).join(','));
    }
    asserta(firmes.size >= 2, 'totes les sessions han sortit idèntiques');
  });

  prova('substitució: canvia l’activitat sense trencar la sessió', () => {
    let canvis = 0;
    for (let i = 0; i < 10; i++) {
      const r = generaSessio({ durada: 45, lloc: 'qualsevol', intensitat: 'intensa' }, CATALEG_EXEMPLE, paramsProva);
      asserta(r.ok, r.error || '');
      const s = r.sessio;
      const abans = s.activitats[1].activitat.id;
      const nova = substitueixActivitat(s, 1, CATALEG_EXEMPLE, paramsProva);
      if (nova) {
        canvis++;
        asserta(nova.activitats[1].activitat.id !== abans, 'la substitució ha retornat la mateixa activitat');
        const ids = nova.activitats.map(x => x.activitat.id);
        asserta(new Set(ids).size === ids.length, 'substitució ha duplicat activitats');
      }
    }
    asserta(canvis > 0, 'cap substitució ha trobat alternativa en 10 intents');
  });

  prova('exclusió: una activitat feta fa poc no torna a sortir', () => {
    const ahir = new Date(Date.now() - 86400000).toISOString();
    const historial = [{ data: ahir, durada: 30, activitats: [{ id: 'memory-parelles', bloc: 'nucli', dimensions: ['mental'], minuts: 10 }], dimensions_descartades: [] }];
    for (let i = 0; i < 25; i++) {
      const r = generaSessio({ durada: 30, lloc: 'interior', intensitat: 'normal' }, CATALEG_EXEMPLE, paramsProva, historial);
      asserta(r.ok, r.error || '');
      asserta(!r.sessio.activitats.some(x => x.activitat.id === 'memory-parelles'), 'ha sortit una activitat exclosa per historial');
    }
  });

  prova('penalització: pes segons l’antiguitat de l’última vegada', () => {
    const ara = new Date();
    const fa = dies => new Map([['x', ara.getTime() - dies * 86400000]]);
    const params = { dies_exclusio: 7, dies_penalitzacio: 21 };
    asserta(pesHistorial('x', fa(3), params, ara) === 0, 'feta fa 3 dies hauria de quedar exclosa');
    asserta(pesHistorial('x', fa(10), params, ara) === 0.35, 'feta fa 10 dies hauria de quedar penalitzada');
    asserta(pesHistorial('x', fa(30), params, ara) === 1, 'feta fa 30 dies hauria de tenir pes normal');
    asserta(pesHistorial('mai-feta', fa(3), params, ara) === 1, 'mai feta hauria de tenir pes normal');
  });

  prova('rotació: la sessió curta descarta la dimensió més treballada', () => {
    const fa2dies = new Date(Date.now() - 2 * 86400000).toISOString();
    const historial = [{ data: fa2dies, durada: 60, activitats: [{ id: 'antiga-fisica', bloc: 'nucli', dimensions: ['fisic'], minuts: 50 }], dimensions_descartades: [] }];
    for (let i = 0; i < 8; i++) {
      const r = generaSessio({ durada: 20, lloc: 'qualsevol', intensitat: 'normal' }, CATALEG_EXEMPLE, paramsProva, historial);
      asserta(r.ok, r.error || '');
      asserta(r.sessio.dimensions_descartades.length === 1, 'una sessió de 20 min hauria de descartar una dimensió');
      asserta(r.sessio.dimensions_descartades[0] === 'fisic', 'hauria de descartar la física (la més treballada), ha descartat ' + r.sessio.dimensions_descartades[0]);
    }
  });

  prova('validació d’activitats: detecta els camps incoherents', () => {
    asserta(validaActivitat(CATALEG_EXEMPLE[0]).length === 0, 'una activitat del catàleg d’exemple hauria de ser vàlida');
    const base = JSON.parse(JSON.stringify(CATALEG_EXEMPLE[0]));
    asserta(validaActivitat(Object.assign({}, base, { nom: '  ' })).length > 0, 'nom buit');
    asserta(validaActivitat(Object.assign({}, base, { dimensions: [] })).length > 0, 'sense dimensions');
    asserta(validaActivitat(Object.assign({}, base, { funcio: [] })).length > 0, 'sense funció');
    asserta(validaActivitat(Object.assign({}, base, { durada_min: 10, durada_max: 5 })).length > 0, 'durades invertides');
    asserta(validaActivitat(Object.assign({}, base, { edat_min: 9, edat_max: 3 })).length > 0, 'edats invertides');
    asserta(validaActivitat(Object.assign({}, base, { url: 'exemple.com' })).length > 0, 'url sense protocol');
    asserta(validaActivitat(Object.assign({}, base, { intensitat: 'brutal' })).length > 0, 'intensitat inventada');
  });

  prova('identificadors: slug net i únic', () => {
    asserta(netejaSlug('Córrer màgic!') === 'correr-magic', 'slug amb accents: ' + netejaSlug('Córrer màgic!'));
    asserta(netejaSlug('   ') === 'activitat', 'slug buit ha de tenir valor per defecte');
    asserta(generaIdUnic('Nova activitat', []) === 'nova-activitat', 'id base');
    const cataleg = [{ id: 'nova-activitat' }, { id: 'nova-activitat-2' }];
    asserta(generaIdUnic('Nova activitat', cataleg) === 'nova-activitat-3', 'col·lisió doble: ' + generaIdUnic('Nova activitat', cataleg));
  });

  prova('còpia de seguretat: validació del fitxer', () => {
    asserta(validaCopia(null) !== null, 'null hauria de fallar');
    asserta(validaCopia({ versio: 2 }) !== null, 'versió desconeguda hauria de fallar');
    asserta(validaCopia({ versio: 1, parametres: { fills: [] }, cataleg: [], historial: [] }) === null, 'còpia mínima vàlida');
    asserta(validaCopia({ versio: 1, parametres: { fills: [] }, cataleg: [{ id: 'x' }], historial: [] }) !== null, 'activitat sense nom hauria de fallar');
  });

  prova('còpia de seguretat: fusió sense pèrdues', () => {
    const actual = [{ id: 'a', nom: 'A vella' }, { id: 'b', nom: 'B' }];
    const importat = [{ id: 'a', nom: 'A nova' }, { id: 'c', nom: 'C' }];
    const fusio = fusionaCataleg(actual, importat);
    asserta(fusio.cataleg.length === 3, 'la fusió ha de conservar-ho tot: ' + fusio.cataleg.length);
    asserta(fusio.cataleg.find(x => x.id === 'a').nom === 'A nova', 'l’activitat existent s’ha d’actualitzar');
    asserta(fusio.cataleg.find(x => x.id === 'b').nom === 'B', 'l’activitat no importada s’ha de conservar');
    asserta(fusio.afegides === 1 && fusio.actualitzades === 1, 'recompte: ' + fusio.afegides + '/' + fusio.actualitzades);
    const noves = sessionsNoves([{ data: '2026-07-01T10:00:00Z' }], [{ data: '2026-07-01T10:00:00Z' }, { data: '2026-07-02T10:00:00Z' }]);
    asserta(noves.length === 1 && noves[0].data === '2026-07-02T10:00:00Z', 'les sessions repetides no s’han de duplicar');
  });

  prova('relaxació: si tot el catàleg és recent, genera igualment', () => {
    const ahir = new Date(Date.now() - 86400000).toISOString();
    const historial = [{ data: ahir, durada: 60, activitats: CATALEG_EXEMPLE.map(a => ({ id: a.id, bloc: 'nucli', dimensions: a.dimensions, minuts: 5 })), dimensions_descartades: [] }];
    const r = generaSessio({ durada: 30, lloc: 'qualsevol', intensitat: 'normal' }, CATALEG_EXEMPLE, paramsProva, historial);
    asserta(r.ok, 'amb tot exclòs hauria de relaxar l’exclusió, no fallar: ' + (r.error || ''));
  });

  return resultats;
}

function vistaTests() {
  const resultats = executaTests();
  const passats = resultats.filter(r => r.ok).length;
  let html = '<h1>Tests d’invariants</h1>';
  html += '<p class="' + (passats === resultats.length ? 'test-ok' : 'test-ko') + '">' + passats + ' / ' + resultats.length + ' proves passades</p>';
  html += '<div class="targeta"><ul style="padding-left:20px">';
  for (const r of resultats) {
    html += '<li class="' + (r.ok ? 'test-ok' : 'test-ko') + '">' + (r.ok ? '✔ ' : '✖ ') + esc(r.nom) +
      (r.ok ? '' : '<br><small>' + esc(r.detall) + '</small>') + '</li>';
  }
  html += '</ul></div>';
  app.innerHTML = html;
}

/* ============================================================
   7. ROUTER
   ============================================================ */
const rutes = { '/generar': vistaGenerar, '/sessio': vistaSessio, '/activitats': vistaActivitats, '/historial': vistaHistorial, '/parametres': vistaParametres };
function navega() {
  const ruta = location.hash.replace('#', '') || '/generar';
  const barra = document.querySelector('nav');
  if (ruta === '/tests') {
    barra.style.display = 'none';
    vistaTests();
    window.scrollTo(0, 0);
    return;
  }
  if (!usuari) {
    barra.style.display = 'none';
    vistaAcces();
    window.scrollTo(0, 0);
    return;
  }
  if (!dades) {
    barra.style.display = 'none';
    app.innerHTML = '<h1>⚡ Entrenament dels herois</h1><div class="buit"><p>Carregant les dades…</p></div>';
    return;
  }
  barra.style.display = 'flex';
  (rutes[ruta] || vistaGenerar)();
  document.querySelectorAll('nav a').forEach(a => {
    a.classList.toggle('actiu', a.dataset.ruta === ruta);
  });
  window.scrollTo(0, 0);
}
function renavega() {
  const actiu = document.activeElement;
  if (actiu && app.contains(actiu) && ['INPUT', 'TEXTAREA', 'SELECT'].includes(actiu.tagName)) return;
  if (estatActivitats.editant !== null) return;
  navega();
}
window.addEventListener('hashchange', navega);
navega();
</script>
